name: CI

on:
  pull_request:
    branches: [dev, staging, main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    # Détermine l'environment selon la branche cible de la PR
    environment: ${{ github.base_ref == 'main' && 'production' || 'staging' }}
    # Only run when web files change
    if: |
      contains(github.event.pull_request.changed_files, 'apps/web') ||
      contains(github.event.pull_request.changed_files, 'packages/shared')
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build:web
